name: Docker CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push todo-service image
        uses: docker/build-push-action@v6
        with:
          context: ./todo-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mini-projet-todo-service:latest

      - name: Build and push stats-service image
        uses: docker/build-push-action@v6
        with:
          context: ./stats-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mini-projet-stats-service:latest